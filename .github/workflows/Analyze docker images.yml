name: Analyze Docker Images

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      is_release:
        description: 'Analyze Release images (if false, analyzes pre-release images)'
        required: true
        type: boolean
        default: true
      package_version:
        description: 'Package Version (e.g., 7.3.1 for release, 7.3.2 for pre-release)'
        required: false
        default: "7.3.1"
        type: string
      build_version:
        description: 'Build Version (only used for release images, e.g., 6399)'
        required: false
        default: "6399"
        type: string

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_VERSION: "7.3.1"
  BUILD_VERSION: "6399"
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}  

jobs:
  FindStandardAndExtensionVersions:
    uses: Ed-Fi-Alliance-OSS/Ed-Fi-ODS/.github/workflows/Find Standard and Extension Versions.yml@874b608a0f3a14243e0035dd1222169fafcbe8d3
    with:
      calling_branch: ${{ github.head_ref || github.ref_name }}

  analyze-docker:
    needs: FindStandardAndExtensionVersions
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      security-events: write
    strategy:
      matrix:
        StandardVersion: ${{ fromJson(needs.FindStandardAndExtensionVersions.outputs.StandardVersions) }}
        ExtensionVersion: ${{ fromJson(needs.FindStandardAndExtensionVersions.outputs.ExtensionVersions) }}    
        dockerfile:
          [
            { name: "ods-api-bulk-load-console", path: "alpine" },
            { name: "ods-api-db-admin", path: "alpine/pgsql" },
            { name: "ods-api-db-ods-minimal", path: "alpine/pgsql" },
            { name: "ods-api-db-ods-sandbox", path: "alpine/pgsql" },
            { name: "ods-api-swaggerui", path: "alpine" },
            { name: "ods-api-web-api", path: "alpine/pgsql" },
            { name: "ods-api-web-api", path: "alpine/mssql" },
            { name: "ods-api-web-sandbox-admin", path: "alpine/pgsql" },
            { name: "ods-api-web-sandbox-admin", path: "alpine/mssql" }
          ]
    name: ${{ matrix.dockerfile.name }}/${{ matrix.dockerfile.path }} Image for (Standard ${{ matrix.StandardVersion }} Extension ${{ matrix.ExtensionVersion }}) 
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Determine package and build versions
        run: |
          # Use workflow inputs if triggered manually, otherwise use env defaults
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $packageVersion = "${{ inputs.package_version }}"
            $buildVersion = "${{ inputs.build_version }}"
            $isRelease = "${{ inputs.is_release }}"
          } else {
            $packageVersion = "${{ env.PACKAGE_VERSION }}"
            $buildVersion = "${{ env.BUILD_VERSION }}"
            $isRelease = "true"  # Scheduled runs default to release
          }
          
          echo "PACKAGE_VERSION_USED=$packageVersion" >> $env:GITHUB_ENV
          echo "BUILD_VERSION_USED=$buildVersion" >> $env:GITHUB_ENV
          echo "IS_RELEASE=$isRelease" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set Image Full Name
        run: |
          $packageVersion = $env:PACKAGE_VERSION_USED
          $buildVersion = $env:BUILD_VERSION_USED
          $isRelease = $env:IS_RELEASE
          $standardVersion = "${{ matrix.StandardVersion }}"
          $imageName = "${{ matrix.dockerfile.name }}"
          $path = "${{ matrix.dockerfile.path }}"
          
          # Construct image tag based on release vs prerelease
          if ($isRelease -eq "true") {
            # Release format: edfialliance/ods-api-web-api:7.3.1_6399-6.0.0
            $tag = "${packageVersion}_${buildVersion}-${standardVersion}"
          } else {
            # Prerelease format varies by Data Standard:
            # - For 6.0.0: pre-732 (no standard suffix)
            # - For others: pre-732-4.0.0 or pre-732-5.2.0
            
            # Extract major.minor from package version (7.3.2 -> 732)
            $shortVersion = $packageVersion -replace '\.', ''
            
            if ($standardVersion -eq "6.0.0") {
              # Current standard: pre-732
              $tag = "pre-${shortVersion}"
            } else {
              # Legacy standards: pre-732-4.0.0 or pre-732-5.2.0
              $tag = "pre-${shortVersion}-${standardVersion}"
            }
          }
          
          $image = "edfialliance/${imageName}:${tag}"
          
          # Add -mssql suffix for MSSQL images
          if ($path.EndsWith("mssql")) {
              $image += "-mssql"
          }
          
          Write-Host "Analyzing image: $image"
          echo "IMAGENAME=$image" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set Safe Filename for SARIF Report
        id: set-safe-filename
        run: |
          # Sanitize image name for use as filename
          # Replace invalid characters (/, :) with hyphens
          $safeImageName = "${{ env.IMAGENAME }}" -replace '[/:]', '-'
          echo "SAFE_IMAGENAME=$safeImageName" >> $env:GITHUB_ENV
          Write-Host "Safe filename: $safeImageName"
        shell: pwsh


      - name: Analyze
        uses: docker/scout-action@b23590dc1e4d09febc00cfcbc51e9e8c0f7ee9f3  # v1.16.1
        with:
          command: cves
          image: ${{ env.IMAGENAME }}
          sarif-file: sarif-${{ env.SAFE_IMAGENAME }}.output.json
          summary: true
          only-severities: "critical,high"

      - name: Upload vulnerabilities-${{ env.IMAGENAME }} Report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: vulnerabilities-${{ env.SAFE_IMAGENAME }}
          path: sarif-${{ env.SAFE_IMAGENAME }}.output.json
      - name: Upload SARIF result
        id: upload-sarif
        if: ${{ github.event_name != 'pull_request_target' }}
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169 # v3.28.0
        with:
          sarif_file: sarif-${{ env.SAFE_IMAGENAME }}.output.json
     
      - name: Check for Critical and High vulnerabilities
        run: |
          $sarifFile = "sarif-${{ env.SAFE_IMAGENAME }}.output.json"
          $sarifContent = Get-Content -Path $sarifFile | ConvertFrom-Json
          foreach ($result in $sarifContent.runs.results) {
            $severity = ($result.message.text -match "Severity\s+:\s+(.*)\s*\n") | Out-Null
            $severity = $matches[1].Trim()

            if ($severity -ieq "critical" -or $severity -ieq "high") {
              $criticalHighVulnerabilities++
              Write-Host "Found $severity vulnerability: $($result.ruleId)"
            }
          }

          if ($criticalHighVulnerabilities -gt 0) {
            Write-Error "Found $criticalHighVulnerabilities critical or high vulnerabilities."
            exit 1
          } else {
            Write-Host "No critical or high vulnerabilities found."
          }
        shell: pwsh
  finalize:
    needs: analyze-docker  # Depends on the analyze-docker job
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all vulnerability reports
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          path: ./vulnerability-reports    
      - name: Determine if there were critical or high vulnerabilities
        run: |
          # Get all files in the directory
          $files = Get-ChildItem -Path ./vulnerability-reports -Recurse -File
          foreach ($file in $files) {
            $sarifData = Get-Content $file.FullName | ConvertFrom-Json
              foreach ($result in $sarifData.runs.results) {
                $severity = ($result.message.text -match "Severity\s+:\s+(.*)\s*\n") | Out-Null
                $severity = $matches[1].Trim()

                if ($severity -ieq "critical" -or $severity -ieq "high") {
                  $criticalHighVulnerabilities++
                  Write-Host "Found $severity vulnerability: $($result.ruleId) in $file.FullName"
                }
              }
          }

          if ( $criticalHighVulnerabilities  -gt 0) {
            Write-Error "Critical or High vulnerabilities found in previous jobs."
            exit 1
          } else {
            Write-Host "No critical or high vulnerabilities found."
          }
        shell: pwsh